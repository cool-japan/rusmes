# RusMES Configuration File
# Example configuration for the Rust Mail Enterprise Server

domain = "example.com"
postmaster = "postmaster@example.com"

# SMTP Server Configuration
[smtp]
host = "0.0.0.0"
port = 2525              # Use non-privileged port for testing (25 requires root)
tls_port = 2587          # STARTTLS port (587 requires root)
max_message_size = "50MB"
require_auth = true      # Enable SMTP authentication
enable_starttls = true
allow_relay = true       # Allow relaying to external domains

# IMAP Server Configuration (optional)
[imap]
host = "0.0.0.0"
port = 2143              # Use non-privileged port (143 requires root)
tls_port = 2993          # SSL/TLS port (993 requires root)

# JMAP Server Configuration (optional)
[jmap]
host = "0.0.0.0"
port = 8080
base_url = "http://localhost:8080"

# POP3 Server Configuration (optional)
[pop3]
host = "0.0.0.0"
port = 2110              # Use non-privileged port (110 requires root)
tls_port = 2995          # SSL/TLS port (995 requires root)
timeout_seconds = 600    # 10 minutes
enable_stls = false

# Storage Backend Configuration
[storage]
backend = "filesystem"
path = "/tmp/rusmes/mail"

# Authentication Backend Configuration
# Options: file, ldap, sql, oauth2
[auth]
backend = "file"
path = "/tmp/rusmes/users.txt"  # Password file path (username:bcrypt_hash format)

# SMTP Relay Configuration for outbound mail
[relay]
host = "tetsuya99.sakura.ne.jp"
port = 587
use_tls = false
username = "hoge@terra-intl.com"
password = "hogehogehoge"

# Security Configuration
[security]
relay_networks = ["127.0.0.0/8", "0.0.0.0/0"]  # Allow localhost and all IPs to relay
blocked_ips = []  # No blocked IPs
check_recipient_exists = false
reject_unknown_recipients = false

# Alternative: PostgreSQL backend
# [storage]
# backend = "postgres"
# connection_string = "postgresql://rusmes:password@localhost/rusmes"

# Alternative: AmateRS distributed backend
# [storage]
# backend = "amaters"
# endpoints = ["amaters1:8080", "amaters2:8080", "amaters3:8080"]
# replication_factor = 3

# Mail Processing Pipeline
# Processors define how mail flows through the system based on state

# Root Processor - Entry point for all incoming mail
[[processors]]
name = "root"
state = "root"

# Step 1: Deliver to local recipients
[[processors.mailets]]
matcher = "RecipientIsLocal"
mailet = "LocalDelivery"

# Step 2: Relay remote mail to transport processor
[[processors.mailets]]
matcher = "All"
mailet = "RemoteDelivery"
params = { relay_host = "tetsuya99.sakura.ne.jp", relay_port = "587", relay_use_tls = "true", relay_username = "hoge@terra-intl.com", relay_password = "hogehogehoge" }

# Transport Processor - Outbound mail delivery
[[processors]]
name = "transport"
state = "transport"

# Relay to remote SMTP servers
[[processors.mailets]]
matcher = "All"
mailet = "RemoteDelivery"
params = { relay_host = "tetsuya99.sakura.ne.jp", relay_port = "587", relay_use_tls = "true", relay_username = "hoge@terra-intl.com", relay_password = "hogehogehoge" }

# Local Delivery Processor
[[processors]]
name = "local-delivery"
state = "local-delivery"

# Deliver to local mailboxes
[[processors.mailets]]
matcher = "All"
mailet = "LocalDelivery"

# Error Processor - Handle delivery failures
[[processors]]
name = "error"
state = "error"

# Send bounce messages
[[processors.mailets]]
matcher = "All"
mailet = "LocalDelivery"
