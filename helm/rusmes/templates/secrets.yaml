{{- if not .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rusmes.fullname" . }}-db
  labels:
    {{- include "rusmes.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.externalPostgresql.password | b64enc | quote }}
  username: {{ .Values.externalPostgresql.username | b64enc | quote }}
  database: {{ .Values.externalPostgresql.database | b64enc | quote }}
  host: {{ .Values.externalPostgresql.host | b64enc | quote }}
  port: {{ .Values.externalPostgresql.port | toString | b64enc | quote }}
{{- end }}
---
{{- if and .Values.tls.enabled (not .Values.tls.existingSecret) (not .Values.tls.certManager.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rusmes.fullname" . }}-tls
  labels:
    {{- include "rusmes.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  # NOTE: These are placeholders. You must provide actual TLS certificates.
  # Generate with:
  #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #     -keyout tls.key -out tls.crt -subj "/CN={{ .Values.config.hostname }}"
  #   kubectl create secret tls {{ include "rusmes.fullname" . }}-tls \
  #     --cert=tls.crt --key=tls.key -n {{ .Release.Namespace }}
  tls.crt: ""
  tls.key: ""
{{- end }}
---
{{- if .Values.backup.s3.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rusmes.fullname" . }}-s3
  labels:
    {{- include "rusmes.labels" . | nindent 4 }}
type: Opaque
data:
  access-key-id: {{ .Values.backup.s3.accessKeyId | b64enc | quote }}
  secret-access-key: {{ .Values.backup.s3.secretAccessKey | b64enc | quote }}
  bucket: {{ .Values.backup.s3.bucket | b64enc | quote }}
  region: {{ .Values.backup.s3.region | b64enc | quote }}
{{- end }}
---
{{- if .Values.acme.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rusmes.fullname" . }}-acme
  labels:
    {{- include "rusmes.labels" . | nindent 4 }}
type: Opaque
data:
  email: {{ .Values.acme.email | b64enc | quote }}
  server: {{ .Values.acme.server | b64enc | quote }}
{{- end }}
