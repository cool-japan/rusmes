  labels:
    app: rusmes
    component: headless
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: smtp
    port: 25
    targetPort: smtp
    protocol: TCP
  - name: imap
    port: 143
    targetPort: imap
    protocol: TCP
  - name: pop3
    port: 110
    targetPort: pop3
    protocol: TCP
