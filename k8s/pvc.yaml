apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rusmes-backup
  namespace: rusmes
  labels:
    app: rusmes
    component: backup
  annotations:
    description: "Shared backup storage for RusMES mail archives"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 500Gi

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  labels:
    app: rusmes
    tier: performance
  annotations:
    description: "High-performance SSD storage for mail data"
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
  fsType: ext4
  kmsKeyId: ""  # Optional: Specify KMS key for encryption
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
  labels:
    app: rusmes
    tier: shared
  annotations:
    description: "NFS storage for shared backups and archives"
provisioner: nfs.csi.k8s.io
parameters:
  server: nfs-server.example.com
  share: /exports/rusmes
mountOptions:
  - hard
  - nfsvers=4.1
  - timeo=600
  - retrans=2
  - rsize=1048576
  - wsize=1048576
allowVolumeExpansion: true
reclaimPolicy: Retain

---
# PostgreSQL PVC (if using in-cluster PostgreSQL)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: rusmes
  labels:
    app: postgres
    component: database
  annotations:
    description: "PostgreSQL database storage"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi

---
# Optional: Local SSD StorageClass (for cloud providers with local SSDs)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-ssd
  labels:
    app: rusmes
    tier: ultra-performance
  annotations:
    description: "Local SSD storage for maximum performance (ephemeral)"
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
