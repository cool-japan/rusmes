apiVersion: v1
kind: Secret
metadata:
  name: rusmes-tls
  namespace: rusmes
  labels:
    app: rusmes
    component: tls
  annotations:
    description: "TLS certificates for SMTP, IMAP, POP3, JMAP"
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Replace with actual certificates
  #
  # Generate self-signed certificates for testing:
  # openssl req -x509 -newkey rsa:4096 -keyout tls.key -out tls.crt -days 365 -nodes \
  #   -subj "/CN=mail.example.com"
  #
  # Create secret:
  # kubectl create secret tls rusmes-tls \
  #   --cert=tls.crt \
  #   --key=tls.key \
  #   -n rusmes
  #
  # Or use cert-manager for automatic TLS:
  # See ingress.yaml for cert-manager annotations
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUZZVEND...PLACEHOLDER...
  tls.key: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQpNSUlK...PLACEHOLDER...

---
apiVersion: v1
kind: Secret
metadata:
  name: rusmes-db
  namespace: rusmes
  labels:
    app: rusmes
    component: database
  annotations:
    description: "Database credentials for PostgreSQL backend"
type: Opaque
stringData:
  # PostgreSQL database credentials
  # IMPORTANT: Change these values in production
  POSTGRES_PASSWORD: "CHANGEME-use-strong-password-here"
  POSTGRES_USER: "rusmes"
  POSTGRES_DB: "rusmes"
  POSTGRES_HOST: "postgres-service.rusmes.svc.cluster.local"
  POSTGRES_PORT: "5432"

---
apiVersion: v1
kind: Secret
metadata:
  name: rusmes-admin
  namespace: rusmes
  labels:
    app: rusmes
    component: admin
  annotations:
    description: "Administrator credentials"
type: Opaque
stringData:
  # Administrator credentials
  # IMPORTANT: Change these values in production
  ADMIN_PASSWORD: "CHANGEME-use-strong-password-here"
  ADMIN_EMAIL: "admin@example.com"
  ADMIN_USERNAME: "admin"

---
apiVersion: v1
kind: Secret
metadata:
  name: rusmes-dkim
  namespace: rusmes
  labels:
    app: rusmes
    component: dkim
  annotations:
    description: "DKIM private key for email signing"
type: Opaque
stringData:
  # DKIM private key for email authentication
  #
  # Generate DKIM key pair:
  # openssl genrsa -out dkim.key 2048
  # openssl rsa -in dkim.key -pubout -out dkim.pub
  #
  # Then publish the public key in DNS:
  # default._domainkey.example.com. IN TXT "v=DKIM1; k=rsa; p=<public-key-base64>"
  #
  # IMPORTANT: Replace with actual DKIM private key
  dkim.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIEpAIBAAKCAQEA1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKL
    MNOPQRSTUVWXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMN
    OPQRSTUVWXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOP
    QRSTUVWXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQR
    STUVWXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRST
    UVWXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUV
    WXYZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWX
    YZ1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
    -----END RSA PRIVATE KEY-----
  dkim.selector: "default"
  dkim.domain: "example.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: rusmes-backup-s3
  namespace: rusmes
  labels:
    app: rusmes
    component: backup
  annotations:
    description: "S3 credentials for backup storage"
type: Opaque
stringData:
  # S3 or S3-compatible storage credentials for backups
  # IMPORTANT: Change these values in production
  AWS_ACCESS_KEY_ID: "CHANGEME-your-access-key-id"
  AWS_SECRET_ACCESS_KEY: "CHANGEME-your-secret-access-key"
  AWS_DEFAULT_REGION: "us-east-1"
  S3_BUCKET: "rusmes-backups"
  S3_ENDPOINT: "https://s3.amazonaws.com"  # Or MinIO/Ceph endpoint
